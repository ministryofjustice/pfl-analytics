name: 'Environment deploy'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      registry:
        required: true
        type: string

jobs:
  deploy_environment:
    name: 'Deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
    env:
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Inject environment variables'
        env:
          TPL_PATH: 'deploy/${{ inputs.environment }}'
          ECR_URL: ${{ inputs.registry }}/${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          APP_HOST: ${{ vars.APP_HOST }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          OAUTH2_PROXY_COOKIE_SECRET: ${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
        run: |
          for file in "$TPL_PATH"/*.tpl.yml; do
            < "$file" envsubst > "${file%.tpl.yml}.yaml"
          done
          rm "$TPL_PATH"/*.tpl.yml

      - name: 'Authenticate to the cluster'
        env:
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
        run: |
          echo "${KUBE_CERT}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${KUBE_TOKEN}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}

      - name: 'Delete stale ingress (one-time fix for redirect extraction)'
        run: |
          kubectl delete ingress ${KUBE_NAMESPACE}-ingress -n ${KUBE_NAMESPACE} --ignore-not-found

      - name: 'Apply manifest files'
        run: |
          kubectl apply -f deploy/${{ inputs.environment }} -n ${KUBE_NAMESPACE}

      - name: 'Wait for rollout'
        run: |
          kubectl rollout status deployment/${KUBE_NAMESPACE}-deployment -n ${KUBE_NAMESPACE}
          kubectl rollout status deployment/oauth2-proxy -n ${KUBE_NAMESPACE}
